AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Stripe Checkout backend for The Ground State Society — creates subscription
  Checkout sessions, reads session status for the success page, and receives
  signature-verified Stripe webhooks.

Parameters:
  CheckoutSecretsArn:
    Type: String
    Description: >
      ARN of the Secrets Manager secret holding a JSON object with
      STRIPE_SECRET_KEY and STRIPE_WEBHOOK_SECRET. The handler fetches it at cold
      start, so the live Stripe key is never a plaintext Lambda env var
      (readable via lambda:GetFunctionConfiguration). The webhook stays
      fail-closed until STRIPE_WEBHOOK_SECRET is present in the secret.
  PriceMonthly:
    Type: String
    Description: Stripe price ID for The Round, monthly ($300/mo)
  PriceAnnual:
    Type: String
    Description: Stripe price ID for The Round, annual ($3,600/yr)
  SiteUrl:
    Type: String
    Default: https://groundstatesociety.com
    Description: Origin the success/cancel URLs point back to
  AlarmEmail:
    Type: String
    Default: ''
    Description: >
      Email for checkout failure alarms. Empty disables the alarms; the SNS
      subscription must be confirmed from the email AWS sends on deploy.

  CheckoutDomainName:
    Type: String
    Default: checkout.groundstatesociety.com
    Description: >
      Custom domain for the checkout API. A stable host lets the site CSP pin an
      exact connect-src origin instead of the region-wide execute-api wildcard.
  CheckoutCertArn:
    Type: String
    Default: ''
    Description: >
      Regional (us-east-2) ACM cert ARN for CheckoutDomainName. Empty disables the
      custom domain (the stack keeps serving the raw execute-api endpoint).

  ReservedConcurrency:
    Type: Number
    Default: 10
    Description: >
      Per-function reserved concurrency (blast-radius cap). Set to -1 to OMIT it
      entirely — required on accounts whose total Lambda concurrency quota is too
      low to reserve any (e.g. a brand-new account still capped at 10).

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]
  HasReservedConcurrency: !Not [!Equals [!Ref ReservedConcurrency, -1]]
  HasCheckoutDomain: !Not [!Equals [!Ref CheckoutCertArn, '']]

Resources:
  # Stripe webhook idempotency. Each processed event id is written once with a
  # TTL (7 days) longer than Stripe's retry window; a replayed delivery fails the
  # conditional put and is dropped before any side effect (e.g. future fulfilment).
  ProcessedEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  CheckoutApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # /checkout is unauthenticated and every request is a Stripe write —
      # throttle hard. A vetted cohort activates one at a time, not in bursts.
      DefaultRouteSettings:
        ThrottlingRateLimit: 10
        ThrottlingBurstLimit: 20
      CorsConfiguration:
        # Production origins only. Local dev runs against backend/checkout/local.mjs
        # (no CORS enforcement) — localhost is deliberately NOT a permitted origin
        # on the deployed payments API.
        AllowOrigins:
          - https://groundstatesociety.com
          - https://www.groundstatesociety.com
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type
        MaxAge: 600

  CheckoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Handler: handler.handler
      CodeUri: src/
      Architectures:
        - arm64
      MemorySize: 256
      Timeout: 15
      # Blast-radius cap: a flood can never consume shared account
      # concurrency or run unbounded Stripe writes
      ReservedConcurrentExecutions: !If [HasReservedConcurrency, !Ref ReservedConcurrency, !Ref AWS::NoValue]
      Environment:
        Variables:
          SECRETS_ARN: !Ref CheckoutSecretsArn
          PRICE_MONTHLY: !Ref PriceMonthly
          PRICE_ANNUAL: !Ref PriceAnnual
          SITE_URL: !Ref SiteUrl
          EVENTS_TABLE: !Ref ProcessedEventsTable
      Policies:
        - Statement:
            # Least privilege: read only the one checkout secret, write only the
            # idempotency table.
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref CheckoutSecretsArn
            - Effect: Allow
              Action: dynamodb:PutItem
              Resource: !GetAtt ProcessedEventsTable.Arn
      Events:
        Checkout:
          Type: HttpApi
          Properties:
            ApiId: !Ref CheckoutApi
            Path: /checkout
            Method: POST
        Session:
          Type: HttpApi
          Properties:
            ApiId: !Ref CheckoutApi
            Path: /session
            Method: GET
        Webhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref CheckoutApi
            Path: /webhook
            Method: POST

  # Until a member system exists, the webhook's structured logs ARE the
  # membership ledger (and they contain member emails) — own the log group
  # explicitly so retention is bounded and deliberate, not account-default.
  CheckoutLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${CheckoutFunction}
      RetentionInDays: 365

  # Custom domain for the checkout API (mirrors the subscribe stack's
  # api.groundstatesociety.com). Conditional: only created when a regional ACM
  # cert ARN is supplied, so the stack still deploys without one.
  CheckoutDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasCheckoutDomain
    Properties:
      DomainName: !Ref CheckoutDomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref CheckoutCertArn
          EndpointType: REGIONAL

  CheckoutApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasCheckoutDomain
    Properties:
      DomainName: !Ref CheckoutDomain
      ApiId: !Ref CheckoutApi
      Stage: $default

  # The handler catches everything and returns 502, so the AWS/Lambda Errors
  # metric never fires for Stripe failures — detection has to read the
  # structured error logs. Lambda's text log format prefixes each line with
  # timestamp/request-id, so these are TERM patterns, not JSON patterns.
  CheckoutFailureMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref CheckoutLogGroup
      FilterPattern: '?"stripe_error" ?"\"at\":\"unhandled\""'
      MetricTransformations:
        - MetricNamespace: GSS/Checkout
          MetricName: CheckoutFailures
          MetricValue: '1'
          DefaultValue: 0

  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      Subscription:
        - Endpoint: !Ref AlarmEmail
          Protocol: email

  CheckoutFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlarmEmail
    Properties:
      AlarmDescription: >-
        Checkout backend logged a Stripe or unhandled error — a founder may be
        unable to activate.
      Namespace: GSS/Checkout
      MetricName: CheckoutFailures
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # Crashes and timeouts DO hit the invocation Errors metric — second net
  CheckoutCrashAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlarmEmail
    Properties:
      AlarmDescription: Checkout Lambda crashed or timed out (invocation errors).
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref CheckoutFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

Outputs:
  ApiUrl:
    Description: Base URL for the checkout API (set as VITE_CHECKOUT_ENDPOINT)
    Value: !Sub https://${CheckoutApi}.execute-api.${AWS::Region}.amazonaws.com
  CheckoutDomainUrl:
    Condition: HasCheckoutDomain
    Description: Custom-domain base URL for the checkout API (set as VITE_CHECKOUT_ENDPOINT at cutover)
    Value: !Sub https://${CheckoutDomainName}
  CheckoutDomainTarget:
    Condition: HasCheckoutDomain
    Description: Point checkout.groundstatesociety.com DNS (CNAME or A/ALIAS) at this regional target
    Value: !GetAtt CheckoutDomain.RegionalDomainName
  CheckoutDomainHostedZoneId:
    Condition: HasCheckoutDomain
    Description: Regional hosted-zone id for an A/ALIAS record to CheckoutDomainTarget
    Value: !GetAtt CheckoutDomain.RegionalHostedZoneId
