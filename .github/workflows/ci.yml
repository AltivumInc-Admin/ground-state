name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: this is a test-only job and never writes to the repo.
permissions:
  contents: read

# Cancel superseded runs so a new push doesn't leave a stale run burning minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Third-party actions pinned to a commit SHA (supply-chain hardening); the
      # trailing comment tracks the human-readable version.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:fe
      - run: npm run lint
      # Compile the real deploy artifact and exercise the prerender / head-injection
      # guards on PRs — Amplify only builds post-merge, so without this a build-
      # breaking change passes the gate and fails at deploy. No Sanity creds in CI,
      # so opt into the empty-issue path explicitly (production sets SANITY_PROJECT_ID).
      - run: npm run build
        env:
          GSS_ALLOW_EMPTY_ISSUES: '1'
