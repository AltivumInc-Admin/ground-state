name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: this is a test-only job and never writes to the repo.
permissions:
  contents: read

# Cancel superseded runs so a new push doesn't leave a stale run burning minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:fe
      - run: npm run lint
