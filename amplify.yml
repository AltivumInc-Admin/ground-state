version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - npm ci
        # Red backend tests block the deploy — the checkout handler's edge
        # cases ride the same repo as the frontend
        - npm test
        # Frontend gate: the Vitest suite (incl. the Stripe open-redirect guard
        # on /activate) and ESLint must pass too. Either going red stops publish.
        - npm run test:fe
        - npm run lint
        # Reconcile the enforcing CSP connect-src with the configured VITE_*
        # endpoint origins: a missing allowlist entry fails the build here instead
        # of silently blocking a form submission (e.g. /apply) in production.
        - node scripts/check-csp.mjs
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
