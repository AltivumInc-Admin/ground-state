customHeaders:
  - pattern: '**'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains'
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=()'
      # Content-Security-Policy. Shipped as Report-Only FIRST so it cannot break
      # the live site — load every route with the console open, resolve any
      # violations, THEN rename this key to 'Content-Security-Policy' (enforcing)
      # and redeploy. index.html has no inline executable script (only the
      # application/ld+json data block + the same-origin module bundle), so
      # script-src 'self' needs no hash. style-src needs 'unsafe-inline' because
      # GSAP/R3F write inline element styles. connect-src lists the signal API
      # and the checkout execute-api; add the apply origin once it is known.
      - key: 'Content-Security-Policy-Report-Only'
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.groundstatesociety.com https://*.execute-api.us-east-2.amazonaws.com; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'"
