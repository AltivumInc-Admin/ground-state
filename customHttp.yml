customHeaders:
  - pattern: '**'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains'
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=()'
      # Content-Security-Policy (ENFORCING). Shipped Report-Only first and soaked
      # 2026-06-24 — zero violations across /, /story, /activate. NOTE: that soak
      # did NOT exercise /signal or /signal/:slug, which embed Sanity-hosted issue
      # images — img-src therefore allows https://cdn.sanity.io (see IssueBody.jsx /
      # fetch-issues.mjs). All first-party JS/CSS/fonts remain self-hosted. index.html
      # has no inline executable script (only the application/ld+json data block +
      # the same-origin module bundle), so script-src 'self' needs no hash.
      # style-src needs 'unsafe-inline' because GSAP/R3F write inline element styles.
      # connect-src lists the signal API and the checkout custom domain; check-csp.mjs
      # (Amplify preBuild) fails the build if a configured VITE_*_ENDPOINT origin
      # (incl. the apply origin at intake-open) is not listed here.
      - key: 'Content-Security-Policy'
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.groundstatesociety.com https://checkout.groundstatesociety.com https://apply.groundstatesociety.com; img-src 'self' data: https://cdn.sanity.io; font-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'"
